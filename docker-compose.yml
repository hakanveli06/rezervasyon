version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - rezervasyon_data:/data
    environment:
      - DB_PATH=/data/rezervasyon.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  rezervasyon_data:
